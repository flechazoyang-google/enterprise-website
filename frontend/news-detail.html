  <script>
    // 页面加载完成后渲染新闻详情
    document.addEventListener('DOMContentLoaded', async () => {
      await renderNewsDetail();
    });

    /**
     * 渲染新闻详情
     */
    async function renderNewsDetail() {
      const detailContent = document.querySelector('.detail-content');
      const newsId = getUrlParam('id'); // 获取URL中的新闻ID

      // 验证ID合法性
      if (!newsId || isNaN(newsId)) {
        detailContent.innerHTML = `<p class="error">新闻ID不合法，请返回新闻列表页</p>`;
        return;
      }

      try {
        // 调用后端接口获取新闻详情
        const res = await request(`/news/${newsId}`);
        if (res.code === 200) {
          const news = res.data;
          // 格式化日期（YYYY-MM-DD → YYYY年MM月DD日）
          const formatDate = news.date.replace(/-/g, '年') + '日';
          
          // 渲染详情HTML
          detailContent.innerHTML = `
            <div class="detail-header">
              <h1 class="news-title">${news.title}</h1>
              <div class="news-meta">
                <span class="news-date"><i class="fas fa-calendar-alt"></i> ${formatDate}</span>
                <span class="news-category"><i class="fas fa-tag"></i> ${news.category}</span>
              </div>
            </div>
            <div class="news-content">
              ${formatDetailContent(news.content)} <!-- 格式化详情内容（换行） -->
            </div>
            <!-- 新闻配图（示例） -->
            <div class="news-img">
              <img src="https://picsum.photos/id/${newsId * 10}/1200/600" alt="${news.title}" loading="lazy">
            </div>
          `;
        } else if (res.code === 404) {
          detailContent.innerHTML = `<p class="error">该新闻不存在或已删除</p>`;
        } else {
          detailContent.innerHTML = `<p class="error">新闻详情加载失败：${res.msg}</p>`;
        }
      } catch (error) {
        detailContent.innerHTML = `<p class="error">新闻详情加载失败，请刷新重试</p>`;
      }
    }

    /**
     * 格式化详情内容（将换行符转为<br>，支持段落分隔）
     */
    function formatDetailContent(content) {
      return content.split('\n').map(paragraph => {
        return paragraph.trim() ? `<p>${paragraph}</p>` : '';
      }).join('');
    }
  </script>
