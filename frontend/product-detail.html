  <script>
    // 页面加载完成后渲染产品详情
    document.addEventListener('DOMContentLoaded', async () => {
      await renderProductDetail();
    });

    /**
     * 渲染产品详情
     */
    async function renderProductDetail() {
      const detailContent = document.querySelector('.detail-content');
      const productId = getUrlParam('id'); // 获取URL中的产品ID

      // 验证ID合法性
      if (!productId || isNaN(productId)) {
        detailContent.innerHTML = `<p class="error">产品ID不合法，请返回产品列表页</p>`;
        return;
      }

      try {
        // 调用后端接口获取产品详情
        const res = await request(`/products/${productId}`);
        if (res.code === 200) {
          const product = res.data;
          // 渲染详情HTML
          detailContent.innerHTML = `
            <div class="detail-header">
              <h1 class="product-title">${product.name}</h1>
              <span class="product-category">分类：${product.category}</span>
            </div>
            <div class="detail-body">
              <div class="product-img">
                <img src="${product.img_url}" alt="${product.name}" loading="lazy">
              </div>
              <div class="product-detail-info">
                <h3>产品简介</h3>
                <p class="product-brief">${product.desc}</p>
                <h3>产品详情</h3>
                <div class="product-full-detail">
                  ${formatDetailContent(product.detail)} <!-- 格式化详情内容（换行） -->
                </div>
                <a href="contact.html" class="btn">咨询合作</a>
              </div>
            </div>
          `;
        } else if (res.code === 404) {
          detailContent.innerHTML = `<p class="error">该产品不存在或已下架</p>`;
        } else {
          detailContent.innerHTML = `<p class="error">产品详情加载失败：${res.msg}</p>`;
        }
      } catch (error) {
        detailContent.innerHTML = `<p class="error">产品详情加载失败，请刷新重试</p>`;
      }
    }

    /**
     * 格式化详情内容（将换行符转为<br>）
     */
    function formatDetailContent(content) {
      return content.replace(/\n/g, '<br>');
    }
  </script>
