  <script>
    let allNews = []; // 存储所有新闻数据

    // 页面加载完成后渲染新闻列表
    document.addEventListener('DOMContentLoaded', async () => {
      await renderNewsList();
      bindNewsFilterEvents();
    });

    /**
     * 渲染新闻列表
     * @param {Array} news - 待渲染的新闻数据（默认全部）
     */
    async function renderNewsList(news = []) {
      const newsList = document.querySelector('.news-list');
      newsList.innerHTML = '<div class="loading"></div>';
      
      try {
        // 首次加载时从接口获取所有新闻
        if (news.length === 0 && allNews.length === 0) {
          const res = await request('/news');
          if (res.code === 200) {
            allNews = res.data; // 按日期降序排列（后端已处理）
          } else {
            newsList.innerHTML = `<p class="error">新闻加载失败：${res.msg}</p>`;
            return;
          }
        }
        
        // 确定最终要渲染的新闻
        const renderNews = news.length > 0 ? news : allNews;
        
        if (renderNews.length === 0) {
          newsList.innerHTML = `<p class="error">暂无匹配的新闻</p>`;
          return;
        }
        
        let html = '';
        renderNews.forEach(item => {
          // 格式化日期（YYYY-MM-DD → YYYY年MM月DD日）
          const formatDate = item.date.replace(/-/g, '年') + '日';
          
          html += `
            <div class="news-item">
              <div class="news-date">
                <span class="date-day">${item.date.split('-')[2]}</span>
                <span class="date-month">${item.date.split('-')[1]}月</span>
                <span class="date-year">${item.date.split('-')[0]}</span>
              </div>
              <div class="news-content">
                <h3 class="news-title">
                  <a href="news-detail.html?id=${item.id}">${item.title}</a>
                </h3>
                <div class="news-meta">
                  <span class="news-category">${item.category}</span>
                </div>
                <p class="news-summary">${item.summary}</p>
                <a href="news-detail.html?id=${item.id}" class="read-more">阅读全文 <i class="fas fa-arrow-right"></i></a>
              </div>
            </div>
          `;
        });
        
        newsList.innerHTML = html;
        
        // 添加入场动画
        scrollAnimation('.news-item', 'animate');
        
        // 同步URL参数（分类筛选时）
        const activeTab = document.querySelector('.filter-tab.active');
        if (activeTab.dataset.category !== 'all') {
          const url = new URL(window.location);
          url.searchParams.set('category', activeTab.dataset.category);
          window.history.pushState({}, '', url);
        } else {
          // 全部新闻时移除分类参数
          const url = new URL(window.location);
          url.searchParams.delete('category');
          window.history.pushState({}, '', url);
        }
      } catch (error) {
        newsList.innerHTML = `<p class="error">新闻加载失败，请刷新重试</p>`;
      }
    }

    /**
     * 绑定新闻筛选事件（分类标签）
     */
    function bindNewsFilterEvents() {
      const filterTabs = document.querySelectorAll('.filter-tab');
      
      filterTabs.forEach(tab => {
        tab.addEventListener('click', () => {
          // 更新标签激活状态
          filterTabs.forEach(t => t.classList.remove('active'));
          tab.classList.add('active');
          
          const category = tab.dataset.category;
          if (category === 'all') {
            // 全部新闻
            renderNewsList();
          } else {
            // 筛选对应分类的新闻
            const filteredNews = allNews.filter(news => news.category === category);
            renderNewsList(filteredNews);
          }
        });
      });
      
      // 初始化时根据URL参数激活对应分类
      const urlCategory = getUrlParam('category');
      if (urlCategory) {
        const targetTab = document.querySelector(`.filter-tab[data-category="${urlCategory}"]`);
        if (targetTab) {
          targetTab.click(); // 触发点击事件，自动筛选
        }
      }
    }
  </script>
